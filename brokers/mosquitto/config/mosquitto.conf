# Eclipse Mosquitto MQTT Broker — konfiguracija za Proj-2
# https://mosquitto.org/man/mosquitto-conf-5.html
#
# Ovaj fajl se montira u kontejner eclipse-mosquitto:2.0 na
# /mosquitto/config/mosquitto.conf. Podesi za visoke testove:
# - 100/1k/10k uređaja
# - QoS 0/1/2
# - Scenariji A/C pod stresom

# --- Mreža ---
listener 1883
protocol mqtt

# --- Autentifikacija (opciono; ostavljeno anonymous za pojednostavljenje) ---
allow_anonymous true

# --- Perzistencija (važno za Scenario B: oporavak pretplate) ---
persistence true
persistence_location /mosquitto/data/

# QoS 1/2 + clean_session=false zahtevaju perzistenciju da bi se
# poruke sačuvale dok je klijent offline.

# --- Skaliranje redova čekanja ---
# Povećani limiti da broker bude u stanju da primi burst bez odbacivanja
# poruka pre nego što storage stigne da ih potroši.
max_queued_messages 1000000
max_inflight_messages 200000
max_queued_bytes 1073741824
max_packet_size 1048576

# --- Mrežni parametri ---
max_connections 100000
max_client_id_length 64

# --- Logovanje ---
log_type error
log_type warning
log_type notice
log_type information
connection_messages true
log_timestamp true
log_dest stdout
