###############################################################################
# Apache Kafka 3.7 — single-node KRaft (bez Zookeeper-a)
# Konfiguracija za Proj-2: MQTT vs Kafka uporedna evaluacija
###############################################################################

# --- Identitet čvora ---
node.id=1

# --- KRaft uloge: isti proces je i broker i controller ---
process.roles=broker,controller

# --- Controller quorum (single-node) ---
controller.quorum.voters=1@localhost:9093
controller.listener.names=CONTROLLER

# --- Listeneri ---
listeners=PLAINTEXT://:9092,CONTROLLER://:9093
advertised.listeners=PLAINTEXT://kafka:9092
listener.security.protocol.map=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
inter.broker.listener.name=PLAINTEXT

# --- Mreža ---
num.network.threads=3
num.io.threads=8

# --- Log direktorijumi (moraju postojati u kontejneru) ---
log.dirs=/var/lib/kafka/data

# --- Particije i replikacija (default; topics se kreiraju sa init-topics.sh) ---
num.partitions=4
default.replication.factor=1
offsets.topic.replication.factor=1
transaction.state.log.replication.factor=1
transaction.state.log.min.isr=1

# --- Auto-create topica ISKLJUČEN (kreiramo ručno) ---
auto.create.topics.enable=false

# --- Performanse ---
num.replica.fetchers=2
replica.fetch.min.bytes=1
replica.fetch.max.bytes=1048576

# --- Producer defaults (acks podešava klijent) ---
# acks=0 → brz, bez garancije
# acks=1 → leader potvrđuje
# acks=all → svi ISR potvrđuju

# --- Consumer defaults ---
group.initial.rebalance.delay.ms=0
offsets.topic.num.partitions=4

# --- Log retention (kratko za testove; production mnogo duže) ---
log.retention.hours=24
log.segment.bytes=1073741824
log.retention.check.interval.ms=300000

# --- Zadržavanje poruka (važno za Scenario B: reconnect) ---
log.retention.minutes=60

# --- Controller instanca (KRaft specifično) ---
controller.quorum.fetch.timeout.ms=2000
controller.quorum.request.timeout.ms=2000
