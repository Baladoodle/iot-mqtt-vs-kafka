name: iots-proj2

# =================================================================
# Kafka overlay — dodaje Kafka u KRaft režimu i postavlja BROKER=kafka.
# Koristiti sa: docker compose -f compose.yaml -f compose.kafka.yaml up
# =================================================================

services:

  kafka:
    image: apache/kafka:3.7.0
    container_name: ${COMPOSE_PROJECT_NAME:-iots-proj2}-kafka
    user: "0:0"   # da init-topics.sh može da piše po /var/lib/kafka/data
    ports:
      - "9092:9092"
    environment:
      # KRaft single-node
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@localhost:9093"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      # Log
      KAFKA_LOG_DIRS: "/var/lib/kafka/data"
      # Replikacija
      KAFKA_NUM_PARTITIONS: "4"
      KAFKA_DEFAULT_REPLICATION_FACTOR: "1"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      # Auto-create OFF
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      # Init
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    command: >
      bash -c "
        if [ ! -f /var/lib/kafka/data/meta.properties ]; then
          /opt/kafka/bin/kafka-storage.sh format -t $$CLUSTER_ID -c /opt/kafka/config/kraft/server.properties --ignore-formatted || true;
        fi &&
        /opt/kafka/bin/kafka-server-start.sh /opt/kafka/config/kraft/server.properties &
        KAFKA_PID=$$!
        sleep 5
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --create --if-not-exists --topic iot-telemetry --partitions 4 --replication-factor 1
        wait $$KAFKA_PID
      "
    volumes:
      - kafka_data:/var/lib/kafka/data
      - ../brokers/kafka-kraft/config/server.properties:/opt/kafka/config/kraft/server.properties:ro
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 15

  ingestion:
    environment:
      BROKER: kafka

  storage:
    environment:
      BROKER: kafka

  analytics:
    environment:
      BROKER: kafka

volumes:
  kafka_data:
